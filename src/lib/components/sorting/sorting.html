<div class="sorting-actions" [attr.aria-label]="ariaLabel()">
  @for (option of options(); track option.key) {
    <mix-round-button
      [iconOnly]="true"
      [active]="isActive(option)"
      [variant]="buttonVariant()"
      [size]="buttonSize()"
      [ariaLabel]="option.label"
      [title]="option.label"
      (clicked)="toggle(option)"
    >
      <mix-icon [name]="iconName(option)" [size]="20" [ariaLabel]="option.label" />
    </mix-round-button>
  }
</div>
