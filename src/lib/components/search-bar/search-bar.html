<div class="search-wrap">
  <input
    type="search"
    class="search-input"
    [attr.aria-label]="ariaLabel()"
    [placeholder]="placeholder()"
    [value]="query()"
    [disabled]="disabled()"
    (input)="onInput($event)"
    (keydown.enter)="submit()"
  />

  @if (showSubmitButton()) {
    <button
      type="button"
      class="search-submit"
      [disabled]="disabled()"
      [attr.aria-label]="buttonAriaLabel()"
      (click)="submit()"
    >
      <mix-icon [name]="iconName()" [size]="20" [decorative]="true" />
    </button>
  }
</div>
