@if (resolvedTotalPages() > 1) {
  <nav class="app-pagination" [attr.aria-label]="ariaLabel()">
    <div class="app-pagination__pages">
      @if (showPrevNext()) {
        <button
          type="button"
          class="app-pagination__btn"
          [disabled]="currentPage() <= 1"
          (click)="goToPage(currentPage() - 1)"
        >
          {{ previousLabel() }}
        </button>
      }

      @for (p of visiblePages(); track p) {
        <button
          type="button"
          class="app-pagination__btn"
          [class.is-active]="p === currentPage()"
          [attr.aria-current]="p === currentPage() ? 'page' : null"
          (click)="goToPage(p)"
        >
          {{ p }}
        </button>
      }

      @if (showPrevNext()) {
        <button
          type="button"
          class="app-pagination__btn"
          [disabled]="currentPage() >= resolvedTotalPages()"
          (click)="goToPage(currentPage() + 1)"
        >
          {{ nextLabel() }}
        </button>
      }
    </div>

    @if (showJump()) {
      <label class="app-pagination__jump">
        <span>{{ goToPageLabel() }}</span>
        <input
          #pageInput
          type="number"
          class="app-pagination__input"
          [value]="currentPage()"
          [min]="1"
          [max]="resolvedTotalPages()"
          (keydown.enter)="commitPageInput(pageInput.value)"
          (blur)="commitPageInput(pageInput.value)"
        />
        <span>/ {{ resolvedTotalPages() }}</span>
      </label>
    }
  </nav>
}
